name: All tests

on:
  pull_request:

  workflow_call:
    outputs:
      successful_run:
        description: "Indication that all tests have succeeded"
        value: ${{ jobs.all-tests.outputs.successful_run }}
jobs:
  all-tests:
    name: Run all tests
    runs-on: ubuntu-latest
    outputs:
      successful_run: ${{steps.output.outputs.successful_run}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
        with:
          version: v0.31.1
      - name: Build docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: sportscrape-development
          cache-from: type=gha,scope=sportscrape
          cache-to: type=gha,mode=max,scope=sportscrape
      - name: Run all tests
        id: test_run
        run: docker compose -p sportscrape -f docker-compose.yml --project-directory . run --rm -T sportscrape-local make all-tests
      - name: Archive test output and coverage
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            coverage.out
            coverage.html
          retention-days: 30
      - name: outputs
        id: output
        if: ${{!cancelled()}}
        env:
          WORKFLOW_SUCCESS: "${{ steps.test_run.outcome }}"
        run: |
          if [[ "$WORKFLOW_SUCCESS" == "success" ]]; then
            echo "successful_run=true"
            echo "successful_run=true" >> $GITHUB_OUTPUT
          else
            echo "successful_run=false"
            echo "successful_run=false" >> $GITHUB_OUTPUT
          fi
